      - lastName
      - company
      - jobTitle
      - functionalArea
    visible:
      - email
      - country
      - phone
      - state
      - postalCode
      - primaryProductInterest

acceptanceCriteria:
  - 'Unknown visitor sees the full default field set for the configured template.'
