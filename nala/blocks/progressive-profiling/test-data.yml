fieldRules:
  short:
    visible:
      - email
      - firstName
      - lastName
      - company
      - country
    hidden:
      - state
      - postalCode
      - phone
      - jobTitle
      - functionalArea
      - primaryProductInterest
  medium:
    visible:
      - email
      - firstName
      - lastName
      - company
      - country
      - jobTitle
      - functionalArea
    hidden:
      - state
      - postalCode
      - phone
      - primaryProductInterest
  rfi:
    visible:
      - email
      - firstName
      - lastName
      - company
      - country
      - phone
      - jobTitle
      - functionalArea
      - primaryProductInterest
    visibleAfterCountry:
      - state
      - postalCode
    hidden: []

emailLinkJourneys:
  shortToMedium:
    hidden:
      - firstName
      - lastName
      - company
    visible:
      - email
      - country
      - jobTitle
      - functionalArea
  shortToRfi:
    hidden:
      - firstName
      - lastName
      - company
    visible:
      - email
      - country
      - phone
      - state
      - postalCode
      - jobTitle
      - functionalArea
      - primaryProductInterest
  mediumToRfi:
